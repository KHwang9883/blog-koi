<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dayGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0077e6"/>
      <stop offset="6%" stop-color="#007ee8"/>
      <stop offset="12%" stop-color="#0085ea"/>
      <stop offset="18%" stop-color="#008bec"/>
      <stop offset="24%" stop-color="#0091ee"/>
      <stop offset="30%" stop-color="#0097f0"/>
      <stop offset="36%" stop-color="#009df2"/>
      <stop offset="42%" stop-color="#00a3f4"/>
      <stop offset="48%" stop-color="#00aaf6"/>
      <stop offset="54%" stop-color="#33b0f8"/>
      <stop offset="60%" stop-color="#4db6fa"/>
      <stop offset="66%" stop-color="#66bcfc"/>
      <stop offset="72%" stop-color="#80c2fd"/>
      <stop offset="78%" stop-color="#99c8fe"/>
      <stop offset="84%" stop-color="#adceff"/>
      <stop offset="90%" stop-color="#c2d4ff"/>
      <stop offset="96%" stop-color="#d7daff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" result="noiseMono"/>
      <feBlend in="SourceGraphic" in2="noiseMono" mode="overlay"/>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#dayGradient)"/>
  
  <ellipse cx="200" cy="100" rx="150" ry="120" fill="#ffffff" fill-opacity="0.06" filter="url(#softGlow)"/>
  <ellipse cx="1700" cy="180" rx="120" ry="100" fill="#ffffff" fill-opacity="0.04" filter="url(#softGlow)"/>
  <ellipse cx="960" cy="50" rx="100" ry="80" fill="#ffffff" fill-opacity="0.03" filter="url(#softGlow)"/>
  
  <path d="M0,380 Q480,340 960,380 Q1440,420 1920,370 L1920,600 L0,600 Z" fill="#ffffff" fill-opacity="0.05"/>
  <path d="M0,440 Q320,400 640,440 Q960,480 1280,430 Q1600,390 1920,420 L1920,600 L0,600 Z" fill="#ffffff" fill-opacity="0.03"/>
  <path d="M0,500 Q480,470 960,500 Q1440,530 1920,480 L1920,600 L0,600 Z" fill="#ffffff" fill-opacity="0.02"/>
</svg>
